name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub release in this repo

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "orbx ${GITHUB_REF_NAME#v}" \
            --generate-notes || echo "release already exists, continuing"

      - name: Compute source tarball sha256
        id: tarball
        run: |
          url="https://github.com/$GITHUB_REPOSITORY/archive/refs/tags/$GITHUB_REF_NAME.tar.gz"
          for _ in $(seq 1 15); do
            curl -fsSL "$url" -o /tmp/src.tgz && break
            sleep 4
          done
          echo "sha256=$(sha256sum /tmp/src.tgz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Bump Homebrew formula in defkode/homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          NEW_URL: ${{ steps.tarball.outputs.url }}
          NEW_SHA: ${{ steps.tarball.outputs.sha256 }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::TAP_TOKEN secret not set (fine-grained PAT with contents:write on defkode/homebrew-tap)" >&2
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:$TAP_TOKEN@github.com/defkode/homebrew-tap.git" tap
          cd tap
          f="Formula/orbx.rb"
          sed -i -E "s#^(\s*url ).*#\1\"$NEW_URL\"#" "$f"
          sed -i -E "s#^(\s*sha256 ).*#\1\"$NEW_SHA\"#" "$f"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$f"
          if git diff --cached --quiet; then
            echo "formula already at ${TAG#v}; nothing to bump"
          else
            git commit -m "orbx ${TAG#v}"
            git push
          fi
