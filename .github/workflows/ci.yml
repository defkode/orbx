name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + shellcheck
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck
      - name: Shellcheck
        run: shellcheck bin/orbx test/helpers/orb-stub
      - name: Tests
        run: bats test/
